<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Split Flap Multi-Group Display</title>
<link rel="stylesheet" href="/static/index.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.10.5/dist/cdn.min.js"></script>
<style>
  body { background:#1a1a2e; color:#e6e6e6; font-family:sans-serif; min-height:100vh }
  .container { max-width:860px; margin:2rem auto; padding:0 1rem }
  h1 { text-align:center; padding:1rem; border-bottom:1px solid #333;font-size:1.5em }
  .section { text-align:center; margin-top:1rem; border-top:1px solid #333;padding-top:1rem }
  .wide-input { width:90%; height:3.5rem; font-size:1.2em; border-radius:.5rem;padding:.75rem;resize:none;margin-bottom:.75rem }
  .btn-group { display:flex; justify-content:center; gap:.5rem; margin:.5rem 0 }
  button { padding:.6rem 1.5rem; border:none; border-radius:.4rem;font-size:.95em; cursor:pointer; margin:.2rem;color:#fff }
  .send-btn { background:#0f3460 }.send-btn:hover{background:#1a4b8a}
  .add-btn { background:#e94560 }.confirm-btn{background:#16213e}
  .remove-btn,.clear-btn { background:#c73e1d }
  table { width:100%; border-collapse:collapse; margin:1rem auto;text-align:center }
  td,th { padding:.4rem .8rem; text-align:left }.text-center{text-align:center !important}
</style>
</head>
<body x-data="multiGroupUI()">
<div class="container">
  <h1>SPLIT FLAP MULTI-GROUP DISPLAY</h1>

  <!-- Message Section -->
  <div class="section msg-section">
    <textarea id="master-input" class="wide-input" placeholder="Enter text to display..." x-model="displayText"></textarea>
    <div class="btn-group">
      <button class="send-btn" @click="broadcast()">SEND TO GROUPS</button>
      <button class="clear-btn"  @click="clearDisplay()">CLEAR DISPLAY</button>
    </div>
  </div>

  <!-- Ack Status Section -->
  <div class="section ack-section">
    <h2>ACK Status <span class="sub-header">Auto-updates every 5 seconds</span></h2>
    <table>
      <tr><th style="text-align:left">GROUP (MAC)</th><th>STATUS</th></tr>
      <template x-for="g in slaveGroups" :key="g.mac">
        <tr>
          <td style="text-align:left"><code x-text="g.mac"></code>:<span x-text="g.modules+' modules'"></span></td>
          <td class="text-center"><span x-text="g.acked ? 'ACKED &#9745;' : 'WAITING ('+g.waitCount+')'" :style="'color:'+(g.acked?'#27ae60':'#f39c12')"></span>
            <button class="remove-btn" style="padding:.2rem .6rem;font-size:.8em" @click="confirmAck(g.mac)">CONFIRM</button></td>
        </tr>
      </template>
    </table>
  </div>

  <!-- Slave Configuration Section -->
  <div class="section slave-config">
    <h2>Add Slave Group</h2>
    <div style="display:flex;gap:.5rem;justify-content:center;margin-bottom:.5rem;flex-wrap:wrap">
      <input type="text" id="slave-mac-in" x-model.lazy="newMac" placeholder="//MAC://BB//CC//DD//EE//FF" style="padding:.5rem;font-size:.85em;width:200px;background:#1a1a2e;color:#fff;border:1px solid #444">
      <button class="add-btn" @click="addSlave()">+ Add Group</button>
    </div>
    <button class="clear-btn" @click="clearSlaves()">CLEAR ALL GROUPS</button>
  </div>

  <div style="text-align:center;padding:2rem 0;color:#888;font-size:.75em">Multi-group split-flap &middot; Powered by ESP32 + Microdot</div>
</div>

<script src="/static/multigroup.js"></script>
</body>
</html>
